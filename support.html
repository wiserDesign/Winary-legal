  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #1A1A1A; --card: #2A2A2A; --burgundy: #722F37; --gold: #D4A853; --soft-white: #F5F0EB; --muted: #9E9E9E; --border: rgba(255,255,255,0.07); --blue: #7B8EC8; --green: #6DAF7A; }
    body { background: var(--bg); color: var(--soft-white); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }
    header { padding: 20px 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--border); }
    header a { display: flex; align-items: center; gap: 6px; color: var(--muted); text-decoration: none; font-size: 13px; transition: color 0.2s; }
    header a:hover { color: var(--soft-white); }
    header a svg { flex-shrink: 0; }
    header h1 { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; color: var(--soft-white); }
