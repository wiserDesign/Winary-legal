<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Winary</title>
  <style>
    :root {
      --bg: #121212;
      --card: #1c1c1c;
      --text: #f4f1ea;
      --muted: #b7ada3;
      --accent: #d4a853;
      --border: rgba(255,255,255,0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 520px;
      text-align: center;
    }

    .logo {
      width: 96px;
      height: 96px;
      object-fit: contain;
      margin: 0 auto 20px;
      display: block;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      color: var(--accent);
      font-weight: 700;
    }

    p {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 15px;
    }

    .links {
      display: grid;
      gap: 14px;
    }

    .link-card {
      display: block;
      padding: 18px 20px;
      border-radius: 14px;
      background: var(--card);
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    .link-card:hover {
      transform: translateY(-2px);
      border-color: rgba(212,168,83,0.45);
    }

    .link-title {
      display: block;
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .link-subtitle {
      display: block;
      font-size: 14px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <img src="./logo.png" alt="Winary logo" class="logo" />

    <h1>Winary</h1>
    <p>Documentazione legale e supporto</p>

    <section class="links">
      <a class="link-card" href="./privacy.html">
        <span class="link-title">Privacy Policy</span>
        <span class="link-subtitle">Informazioni sul trattamento dei dati</span>
      </a>

      <a class="link-card" href="./terms.html">
        <span class="link-title">Termini di utilizzo</span>
        <span class="link-subtitle">Condizioni del servizio</span>
      </a>

      <a class="link-card" href="./support.html">
        <span class="link-title">Supporto</span>
        <span class="link-subtitle">Contatti e assistenza</span>
      </a>
    </section>
  </main>
</body>
</html>
