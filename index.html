<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calice</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a0a0a;
      color: #f5f0eb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 2.5rem; font-weight: 700; color: #c8a97e; margin-bottom: 0.75rem; }
    p { font-size: 1.1rem; color: #b0a090; max-width: 480px; line-height: 1.6; margin-bottom: 2.5rem; }
    .badges { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-bottom: 3rem; }
    .badge {
      background: #2e1a1a;
      border: 1px solid #5a2d2d;
      color: #c8a97e;
      padding: 0.6rem 1.4rem;
      border-radius: 2rem;
      font-size: 0.9rem;
      text-decoration: none;
      transition: background 0.2s;
    }
    .badge:hover { background: #3d2020; }
    nav { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
    nav a { color: #7a5c5c; font-size: 0.9rem; text-decoration: none; }
    nav a:hover { color: #c8a97e; }
  </style>
</head>
<body>
  <div class="logo">🍷</div>
  <h1>Calice</h1>
  <p>Your personal wine cellar. Track, discover, and remember every bottle.</p>
  <div class="badges">
    <a class="badge" href="https://apps.apple.com" target="_blank">📱 App Store</a>
    <a class="badge" href="https://play.google.com" target="_blank">🤖 Google Play</a>
  </div>
  <nav>
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Service</a>
    <a href="support.html">Support</a>
  </nav>
</body>
</html>
